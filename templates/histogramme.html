<html>
  <head>
    <meta charset="UTF-8" />
    <title>Histogramme — Prévisions Paris</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <h2>Prévisions de température (max) — 7 prochains jours — Paris</h2>
    <canvas id="myChart" width="800" height="400"></canvas>

    <script>
      const labels = {{ labels|tojson }};
      const dataValues = {{ temps|tojson }};

      const ctx = document.getElementById('myChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Température max (°C)',
            data: dataValues,
            backgroundColor: 'rgba(54, 162, 235, 0.5)',
            borderColor: 'rgba(54, 162, 235, 1)',
            borderWidth: 1
          }]
        },
        options: {
          scales: {
            y: {
              beginAtZero: false
            }
          }
        }
      });
    </script>
  </body>
</html>
